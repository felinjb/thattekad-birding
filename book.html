<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now | Thattekad Birding</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--dark);">
    
    <nav class="navbar" id="navbar">
        <div class="logo"><i class="fa-solid fa-leaf"></i> Thattekad Birding</div>
        
        <div class="menu-icon" id="menu-icon">
            <i class="fa-solid fa-bars"></i>
        </div>

        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="tours.html">Tours</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="book.html" class="nav-btn">Book Now</a></li>
        </ul>
    </nav>

    <section class="booking-section" style="padding-top: 150px;">
        <div class="booking-container">
            <h2>Secure Your Spot</h2>
            <p>Availability is strictly limited. Submit your details below to request a guide.</p>
            
            <form id="booking-form">
                <div class="input-group">
                    <input type="text" id="name" placeholder="Full Name" required>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                
                <div class="input-group">
                    <input type="text" id="date" placeholder="Select Date" onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'" required>
                    
                    <select id="tour-type" required>
                        <option value="" disabled selected>Select Tour...</option>
                        <option value="early-morning">Early Morning Chorus</option>
                        <option value="guided-trail">Guided Sanctuary Trail</option>
                        <option value="night-birding">Night Birding Tour</option>
                        <option value="target-species">Target Species Tracking</option>
                        <option value="photographers-special">The Photographer's Special</option>
                        <option value="culture-walk">Village & Culture Walk</option>
                    </select>
                </div>

                <div class="input-group">
                    <textarea id="additional-details" placeholder="Additional Details / Special Requests (Optional)" rows="4" style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; resize: vertical;"></textarea>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" id="btn-whatsapp" class="btn pulse-animation" style="background-color: #25D366; color: white; width: 100%; border: none; font-size: 1.1rem; cursor: pointer;">
                        <i class="fa-brands fa-whatsapp"></i> Send Enquiry through WhatsApp
                    </button>
                    
                    <button type="submit" id="btn-email" class="btn" style="background-color: var(--accent); color: white; width: 100%; border: none; font-size: 1.1rem; cursor: pointer;">
                        <i class="fa-solid fa-envelope"></i> Send Enquiry through Email
                    </button>
                </div>
            </form>
            
            <div id="form-message" class="hidden"></div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <div class="logo"><i class="fa-solid fa-leaf"></i> Thattekad Birding</div>
            <p>Ernakulam, Kerala, India</p>
            <p style="margin-top: 10px;">
                <a href="mailto:info@thattekadbirding.com" style="color: var(--accent); text-decoration: none; font-weight: 600;">info@thattekadbirding.com</a>
            </p>
            <div class="socials">
                <a href="https://wa.me/918921243251" target="_blank" style="color: inherit;"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="mailto:info@thattekadbirding.com" style="color: inherit;"><i class="fa-solid fa-envelope"></i></a>
            </div>
        </div>
        <p class="copyright">&copy; 2026 Thattekad Birding. All rights reserved.</p>
        
    </footer>
    <a href="https://wa.me/918921243251" class="whatsapp-float" target="_blank" aria-label="Chat with us on WhatsApp">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script src="script.js"></script>
</body>
</html>
